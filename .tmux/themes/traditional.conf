
# FIXME: better icons for session, pane, etc

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},bold]  #S },#[none]  #S }" # session name & icon, whitespace as padding
set -ga status-left "#[bg=default,none]" # separator
set -ga status-left "  #{pane_current_command} " # pane and icon
set -ga status-left "#[bg=default,none]" # separator
set -ga status-left "  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} " # pane path
set -ga status-left "#{?window_zoomed_flag,#[bold]  MAX #[none],}" # pane is maximized?

# CENTER
set -g status-justify "absolute-centre"
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
# set -g window-status-last-style "fg=default"
# set -g window-status-activity-style "bg=#{@thm_fg},fg=#{@thm_bg}"
# set -g window-status-bell-style "bg=#{@thm_fg},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[fg=default]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bold"

# status right look and feel
set -g status-right-length 150
set -g status-right ""
# set -ga status-right "" # weather
# set -ga status-right "#[fg=#{@thm_fg},bg=default,none]│" # separator
# set -ga status-right " #{@pomodoro_status}  bla" # pomodoro
# set -ga status-right "#[fg=#{@thm_fg},bg=default,none]│" # separator
# set -ga status-right " 󰔛 #{project_time} " # uptime
# set -ga status-right "#[fg=#{@thm_fg},bg=default,none]│" # separator
set -ga status-right " #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=default,none]" # separator
set -ga status-right " 󰭦 %d.%m.%Y %a 󰅐 %H:%M " # datetime
